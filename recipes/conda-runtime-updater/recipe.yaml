context:
  version: "0.1.0"
  python_min: "3.10"

package:
  name: conda-runtime-updater
  version: ${{ version }}

source:
  path: ../..

build:
  number: 0
  noarch: python
  script:
    content: ${{ PYTHON }} -m pip install ./updater -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.27
  run:
    - python >=${{ python_min }}
    - conda >=26.1.1

tests:
  - python:
      imports:
        - conda_runtime_updater
        - conda_runtime_updater.plugin
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/jezdez/conda-runtime
  repository: https://github.com/jezdez/conda-runtime
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Coordinate standalone conda executable updates with root-prefix transactions.
