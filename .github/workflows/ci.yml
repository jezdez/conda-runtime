name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  updater:
    name: Updater (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: updater/pyproject.toml
          cache: true

      - name: Lint updater
        run: pixi run --manifest-path updater/pyproject.toml --locked lint

      - name: Check updater formatting
        run: pixi run --manifest-path updater/pyproject.toml --locked format-check

      - name: Test updater
        run: pixi run --manifest-path updater/pyproject.toml --locked test

      - name: Build updater distribution
        run: pixi run --manifest-path updater/pyproject.toml --locked build-python

  updater-package:
    name: Updater conda package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: updater/pyproject.toml
          cache: true

      - name: Build updater conda package
        run: pixi run --manifest-path updater/pyproject.toml --locked build-conda-package

      - name: Upload updater conda package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conda-runtime-updater
          path: output/noarch/conda-runtime-updater-*.conda
          if-no-files-found: error
