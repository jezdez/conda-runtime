name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  updater:
    name: Updater (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-name: updater-test
          create-args: >-
            python=3.12
            conda>=26.1.1
            pip
            hatchling>=1.27
            python-build>=1.2
            pytest>=8
            ruff>=0.12
          init-shell: bash
          cache-downloads: true
          cache-environment: true

      - name: Install updater
        shell: bash -el {0}
        run: python -m pip install -e ./updater --no-deps --no-build-isolation

      - name: Lint updater
        shell: bash -el {0}
        run: python -m ruff check updater

      - name: Test updater
        shell: bash -el {0}
        run: python -m pytest updater/tests

      - name: Build updater distribution
        shell: bash -el {0}
        run: python -m build updater

  updater-package:
    name: Updater conda package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/rattler-build-action@1ca5f45832f419a46d1326ccc5861d7e14d67c44 # v0.2.39
        with:
          recipe-path: recipes/conda-runtime-updater/recipe.yaml
          artifact-name: conda-runtime-updater
          build-args: --channel conda-forge
