name: Release standalone conda runtime

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-runtime-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate runtime release
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.release.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Validate release inputs
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          runtime_version="$(
            python3 -c \
              'import tomllib; print(tomllib.load(open("runtime/conda.toml", "rb"))["tool"]["conda-ship"]["runtime-version"])'
          )"
          if [ "$EVENT_NAME" = "push" ]; then
            python3 scripts/validate-runtime-tag.py "$RELEASE_TAG"
          fi
          echo "version=${runtime_version}" >> "$GITHUB_OUTPUT"

  anaconda-preflight:
    name: Check Anaconda.org release credentials
    runs-on: ubuntu-latest
    needs: [validate-release]
    environment: anaconda

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Check release credentials
        env:
          ANACONDA_API_KEY: ${{ secrets.ANACONDA_API_KEY }}
          ANACONDA_OWNER: ${{ secrets.ANACONDA_OWNER }}
        run: python scripts/check-anaconda-token.py

  build-runtime:
    name: Build runtime (${{ matrix.subdir }})
    runs-on: ${{ matrix.os }}
    needs: [validate-release, anaconda-preflight]
    permissions:
      contents: read
      id-token: write # mint the OIDC token used for artifact attestations
      attestations: write # publish executable and package attestations
      artifact-metadata: write # register attested artifact metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - subdir: linux-64
            os: ubuntu-latest
          - subdir: linux-aarch64
            os: ubuntu-24.04-arm
          - subdir: osx-64
            os: macos-15-intel
          - subdir: osx-arm64
            os: macos-15
          - subdir: win-64
            os: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Build with conda-ship 0.6.3
        id: ship
        uses: jezdez/conda-ship@1b80ee88a2d81ea0f4b7d77ac792e106da3cd26a # 0.6.3
        with:
          conda-ship-version: "0.6.3"
          root: runtime

      - name: Stage executable
        id: stage
        shell: bash
        env:
          ASSET_NAME: ${{ steps.ship.outputs.asset-name }}
          BINARY_PATH: ${{ steps.ship.outputs.binary-path }}
          SUBDIR: ${{ matrix.subdir }}
        run: |
          set -euo pipefail

          output_root="${RUNNER_TEMP}/conda-runtime-${SUBDIR}"
          release_dir="${output_root}/release-assets"
          mkdir -p "$release_dir"

          final_binary="${release_dir}/${ASSET_NAME}"
          cp "$BINARY_PATH" "$final_binary"

          {
            echo "final-binary=${final_binary}"
            echo "output-root=${output_root}"
          } >> "$GITHUB_OUTPUT"

      - name: Bootstrap smoke test
        shell: bash
        env:
          BINARY_PATH: ${{ steps.stage.outputs.final-binary }}
          CONDA_OFFLINE: "1"
          CONDA_SHIP_PREFIX: ${{ runner.temp }}/conda-runtime-smoke-prefix
        run: '"$BINARY_PATH" --version'

      - name: Attest executable
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.stage.outputs.final-binary }}

      - name: Package executable for updates
        shell: bash
        env:
          BINARY_PATH: ${{ steps.stage.outputs.final-binary }}
          CS_PATH: ${{ steps.ship.outputs.cs-path }}
          INFO_PATH: ${{ steps.ship.outputs.info-path }}
          OUTPUT_ROOT: ${{ steps.stage.outputs.output-root }}
          RELEASE_VERSION: ${{ needs.validate-release.outputs.release-version }}
          RUNNER_OS_NAME: ${{ runner.os }}
          SUBDIR: ${{ matrix.subdir }}
        run: |
          set -euo pipefail

          package_dir="${OUTPUT_ROOT}/update-packages/${SUBDIR}"
          package_path="${package_dir}/conda-runtime-${RELEASE_VERSION}-0.conda"
          report_path="${RUNNER_TEMP}/conda-runtime-package-${SUBDIR}.json"
          mkdir -p "$package_dir"
          "$CS_PATH" package-update \
            --info "$INFO_PATH" \
            --binary "$BINARY_PATH" \
            --out-dir "$package_dir" \
            --json > "$report_path"

          python_cmd="python3"
          if [ "$RUNNER_OS_NAME" = "Windows" ]; then
            python_cmd="python"
          fi
          "$python_cmd" scripts/verify-update-package.py \
            "$report_path" \
            "$BINARY_PATH" \
            "$package_path" \
            "$RELEASE_VERSION" \
            "$SUBDIR"
          rm "$report_path"

      - name: Attest update package
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.stage.outputs.output-root }}/update-packages/${{ matrix.subdir }}/*.conda

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-build-${{ matrix.subdir }}
          path: ${{ steps.stage.outputs.output-root }}
          if-no-files-found: error
          retention-days: 7

  verify-runtime:
    name: Verify complete runtime distribution
    runs-on: ubuntu-latest
    needs: [validate-release, build-runtime]
    permissions:
      contents: read
      id-token: write # mint the OIDC token used for checksum attestation
      attestations: write # publish the checksum attestation
      artifact-metadata: write # register attested checksum metadata

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: runtime-build-*
          path: staged
          merge-multiple: true

      - name: Validate and checksum release files
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.release-version }}
        run: |
          python3 scripts/verify-runtime-artifacts.py \
            staged \
            "$RELEASE_VERSION" \
            --write-checksums

      - name: Attest checksum manifest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: staged/release-assets/SHA256SUMS

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validated-runtime
          path: staged
          if-no-files-found: error
          retention-days: 7

  prove-installers:
    name: Prove installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [verify-runtime]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: conda-x86_64-unknown-linux-gnu
          - os: windows-latest
            asset: conda-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-runtime
          path: staged

      - name: Prove POSIX installer
        if: runner.os != 'Windows'
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset }}
          RELEASE_ASSETS: ${{ github.workspace }}/staged/release-assets
        run: |
          set -euo pipefail

          install_dir="${RUNNER_TEMP}/conda-runtime-installer-bin"
          fake_bin="${RUNNER_TEMP}/conda-runtime-installer-bin-tools"
          mkdir -p "$fake_bin" "$install_dir"
          install_dir="$(CDPATH='' cd -P "$install_dir" && pwd)"
          destination="${install_dir}/conda"

          cat > "${fake_bin}/curl" <<'EOF'
          #!/bin/sh
          set -eu

          name=${7##*/}
          cp "${RELEASE_ASSETS}/${name}" "$6"
          EOF
          chmod 755 "${fake_bin}/curl"
          export PATH="${fake_bin}:${PATH}"

          sh "${RELEASE_ASSETS}/install.sh" "$install_dir"
          cmp "${RELEASE_ASSETS}/${ASSET_NAME}" "$destination"

          if sh "${RELEASE_ASSETS}/install.sh" "$install_dir"; then
            echo "Installer replaced an existing executable." >&2
            exit 1
          fi
          cmp "${RELEASE_ASSETS}/${ASSET_NAME}" "$destination"

      - name: Prove Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ASSET_NAME: ${{ matrix.asset }}
          RELEASE_ASSETS: ${{ github.workspace }}/staged/release-assets
        run: |
          $ErrorActionPreference = "Stop"
          $Installer = Join-Path $env:RELEASE_ASSETS "install.ps1"
          $InstallDir = Join-Path $env:RUNNER_TEMP "conda-runtime-installer-bin"
          $Destination = Join-Path $InstallDir "conda.exe"

          function Invoke-WebRequest {
              param([switch] $UseBasicParsing, [uri] $Uri, [string] $OutFile)

              $Name = [IO.Path]::GetFileName($Uri.AbsolutePath)
              Copy-Item -LiteralPath (
                  Join-Path $env:RELEASE_ASSETS $Name
              ) -Destination $OutFile
          }

          & $Installer -InstallDir $InstallDir

          $AssetPath = Join-Path $env:RELEASE_ASSETS $env:ASSET_NAME
          $AssetChecksum = (Get-FileHash -Algorithm SHA256 -LiteralPath $AssetPath).Hash
          $InstalledChecksum = (
              Get-FileHash -Algorithm SHA256 -LiteralPath $Destination
          ).Hash
          if ($InstalledChecksum -ne $AssetChecksum) {
              throw "Installed executable does not match the candidate asset"
          }

          try {
              & $Installer -InstallDir $InstallDir | Out-Null
              throw "Installer replaced an existing executable"
          } catch {
              if ($_.Exception.Message -notlike "Refusing to replace*") {
                  throw
              }
          }
          $ChecksumAfter = (
              Get-FileHash -Algorithm SHA256 -LiteralPath $Destination
          ).Hash
          if ($ChecksumAfter -ne $InstalledChecksum) {
              throw "Existing executable changed after refused installation"
          }

  prove-runtime-update:
    name: Prove runtime update (${{ matrix.subdir }})
    runs-on: ${{ matrix.os }}
    needs: [validate-release, anaconda-preflight]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - subdir: linux-64
            os: ubuntu-latest
          - subdir: osx-arm64
            os: macos-15
          - subdir: win-64
            os: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: updater/pyproject.toml
          cache: true

      - name: Prepare exact local channel
        shell: bash
        env:
          SUBDIR: ${{ matrix.subdir }}
        run: |
          pixi run --manifest-path updater/pyproject.toml --locked \
            python scripts/prove-runtime-update.py prepare \
            --work "${RUNNER_TEMP}/conda-runtime-e2e" \
            --platform "$SUBDIR"

      - name: Build generation 1 with conda-ship 0.6.3
        id: ship
        uses: jezdez/conda-ship@1b80ee88a2d81ea0f4b7d77ac792e106da3cd26a # 0.6.3
        with:
          conda-ship-version: "0.6.3"
          root: ${{ runner.temp }}/conda-runtime-e2e/gen1

      - name: Prove the two-layer update
        shell: bash
        env:
          CS_PATH: ${{ steps.ship.outputs.cs-path }}
          GEN1_BINARY: ${{ steps.ship.outputs.binary-path }}
          SUBDIR: ${{ matrix.subdir }}
        run: |
          pixi run --manifest-path updater/pyproject.toml --locked \
            python scripts/prove-runtime-update.py full \
            --work "${RUNNER_TEMP}/conda-runtime-e2e" \
            --platform "$SUBDIR" \
            --cs-path "$CS_PATH" \
            --gen1-binary "$GEN1_BINARY"

  github-release:
    name: Publish GitHub release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [validate-release, verify-runtime, prove-installers, prove-runtime-update]
    outputs:
      created: ${{ steps.publish.outputs.created }}
    permissions:
      contents: write # create the GitHub release and upload its files

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-runtime
          path: staged

      - name: Publish verified release assets
        id: publish
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          release_state() {
            gh release view "$RELEASE_TAG" \
              --json isDraft \
              --jq '.isDraft' \
              2>/dev/null || true
          }

          verify_exact_release() {
            expected_assets="$(
              for asset in staged/release-assets/*; do
                basename "$asset"
              done | LC_ALL=C sort
            )"
            published_assets="$(
              gh release view "$RELEASE_TAG" \
                --json assets \
                --jq '.assets[].name' |
                LC_ALL=C sort
            )"
            if [ "$published_assets" != "$expected_assets" ]; then
              echo "Published release assets do not match the validated files." >&2
              exit 1
            fi

            gh release verify "$RELEASE_TAG"
            for asset in staged/release-assets/*; do
              gh release verify-asset "$RELEASE_TAG" "$asset"
            done
          }

          cleanup_draft() {
            is_draft="$(release_state 2>/dev/null || true)"
            if [ "$is_draft" = "true" ]; then
              gh release delete "$RELEASE_TAG" --yes >/dev/null 2>&1 || true
            fi
          }

          is_draft="$(release_state)"
          if [ -n "$is_draft" ]; then
            if [ "$is_draft" = "true" ]; then
              gh release delete "$RELEASE_TAG" --yes
            elif [ "$(
              gh release view "$RELEASE_TAG" \
                --json isImmutable \
                --jq '.isImmutable'
            )" = "true" ]; then
              verify_exact_release
              echo "created=false" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "Refusing to replace a published mutable release." >&2
              exit 1
            fi
          fi

          trap cleanup_draft ERR
          gh release create "$RELEASE_TAG" \
            staged/release-assets/* \
            --verify-tag \
            --latest \
            --title "$RELEASE_TAG" \
            --notes "Standalone conda ${RELEASE_TAG}"
          trap - ERR
          echo "created=true" >> "$GITHUB_OUTPUT"

  verify-github-release:
    name: Verify immutable GitHub release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [github-release]
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-runtime
          path: staged

      - name: Verify published release and assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_CREATED: ${{ needs.github-release.outputs.created }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          release_state="$(
            gh release view "$RELEASE_TAG" \
              --json isDraft,isImmutable \
              --jq '[.isDraft, .isImmutable] | @tsv'
          )"
          IFS=$'\t' read -r is_draft is_immutable <<< "$release_state"
          if [ "$is_draft" != "false" ] || [ "$is_immutable" != "true" ]; then
            echo "Release must be published and immutable." >&2
            exit 1
          fi
          if [ "$RELEASE_CREATED" != "true" ] && [ "$RELEASE_CREATED" != "false" ]; then
            echo "Release publication did not report whether it created the release." >&2
            exit 1
          fi
          if [ "$RELEASE_CREATED" = "true" ]; then
            latest_tag="$(gh api "repos/${GH_REPO}/releases/latest" --jq '.tag_name')"
            if [ "$latest_tag" != "$RELEASE_TAG" ]; then
              echo "New release was not marked latest." >&2
              exit 1
            fi
          fi

          gh release verify "$RELEASE_TAG"

          for asset in staged/release-assets/*; do
            gh release verify-asset "$RELEASE_TAG" "$asset"
          done

  anaconda-upload:
    name: Upload native update packages
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [validate-release, verify-github-release]
    environment: anaconda
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-runtime
          path: staged

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: updater/pyproject.toml
          run-install: false
          cache: false

      - name: Upload immutable update packages
        shell: bash
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_KEY }}
          ANACONDA_OWNER: ${{ secrets.ANACONDA_OWNER }}
          RELEASE_VERSION: ${{ needs.validate-release.outputs.release-version }}
        run: |
          set -euo pipefail

          pixi run \
            --manifest-path updater/pyproject.toml \
            --environment publish \
            --locked \
            python scripts/publish-runtime-packages.py \
            staged/update-packages \
            "$RELEASE_VERSION" \
            --owner "$ANACONDA_OWNER"
