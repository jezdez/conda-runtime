name: Release standalone conda runtime

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

concurrency:
  group: release-runtime-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate runtime release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Validate release inputs
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 scripts/validate-runtime-tag.py "$RELEASE_TAG"
          test -f runtime/conda.lock

  build-runtime:
    name: Build runtime (${{ matrix.subdir }})
    runs-on: ${{ matrix.os }}
    needs: [validate-release]
    permissions:
      contents: read
      id-token: write # mint the OIDC token used for artifact attestations
      attestations: write # publish executable and package attestations
      artifact-metadata: write # register attested artifact metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - subdir: linux-64
            os: ubuntu-latest
          - subdir: linux-aarch64
            os: ubuntu-24.04-arm
          - subdir: osx-64
            os: macos-15-intel
          - subdir: osx-arm64
            os: macos-15
          - subdir: win-64
            os: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Build with conda-ship 0.6.2
        id: ship
        uses: jezdez/conda-ship@992021e2bb69e573c1475c3bbf5d3d5892e6dfe8 # 0.6.2
        with:
          conda-ship-version: "0.6.2"
          root: runtime

      - name: Stage executable
        id: stage
        shell: bash
        env:
          ASSET_NAME: ${{ steps.ship.outputs.asset-name }}
          BINARY_PATH: ${{ steps.ship.outputs.binary-path }}
          SUBDIR: ${{ matrix.subdir }}
        run: |
          set -euo pipefail

          output_root="${RUNNER_TEMP}/conda-runtime-${SUBDIR}"
          release_dir="${output_root}/release-assets"
          mkdir -p "$release_dir"

          final_binary="${release_dir}/${ASSET_NAME}"
          cp "$BINARY_PATH" "$final_binary"

          {
            echo "final-binary=${final_binary}"
            echo "output-root=${output_root}"
          } >> "$GITHUB_OUTPUT"

      - name: Bootstrap smoke test
        shell: bash
        env:
          BINARY_PATH: ${{ steps.stage.outputs.final-binary }}
          CONDA_SHIP_PREFIX: ${{ runner.temp }}/conda-runtime-smoke-prefix
        run: '"$BINARY_PATH" --version'

      - name: Attest executable
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.stage.outputs.final-binary }}

      - name: Package executable for updates
        shell: bash
        env:
          BINARY_PATH: ${{ steps.stage.outputs.final-binary }}
          CS_PATH: ${{ steps.ship.outputs.cs-path }}
          INFO_PATH: ${{ steps.ship.outputs.info-path }}
          OUTPUT_ROOT: ${{ steps.stage.outputs.output-root }}
          RELEASE_VERSION: ${{ github.ref_name }}
          RUNNER_OS_NAME: ${{ runner.os }}
          SUBDIR: ${{ matrix.subdir }}
        run: |
          set -euo pipefail

          package_dir="${OUTPUT_ROOT}/update-packages/${SUBDIR}"
          package_path="${package_dir}/conda-runtime-${RELEASE_VERSION}-0.conda"
          report_path="${RUNNER_TEMP}/conda-runtime-package-${SUBDIR}.json"
          mkdir -p "$package_dir"
          "$CS_PATH" package-update \
            --info "$INFO_PATH" \
            --binary "$BINARY_PATH" \
            --out-dir "$package_dir" \
            --json > "$report_path"

          python_cmd="python3"
          if [ "$RUNNER_OS_NAME" = "Windows" ]; then
            python_cmd="python"
          fi
          "$python_cmd" scripts/verify-update-package.py \
            "$report_path" \
            "$BINARY_PATH" \
            "$package_path" \
            "$RELEASE_VERSION" \
            "$SUBDIR"
          rm "$report_path"

      - name: Attest update package
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.stage.outputs.output-root }}/update-packages/${{ matrix.subdir }}/*.conda

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-build-${{ matrix.subdir }}
          path: ${{ steps.stage.outputs.output-root }}
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-runtime]
    permissions:
      contents: write # create the GitHub release and upload its files
      id-token: write # mint the OIDC token used for checksum attestation
      attestations: write # publish the checksum attestation
      artifact-metadata: write # register attested checksum metadata

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: runtime-build-*
          path: staged
          merge-multiple: true

      - name: Validate and checksum release files
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python3 scripts/verify-runtime-artifacts.py \
            staged \
            "$RELEASE_VERSION" \
            --write-checksums

      - name: Attest checksum manifest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: staged/release-assets/SHA256SUMS

      - name: Stage and verify executable assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" \
            --draft \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes "Standalone conda ${RELEASE_TAG}"

          cleanup_draft() {
            gh release delete "$RELEASE_TAG" --yes >/dev/null 2>&1 || true
          }
          trap cleanup_draft ERR

          gh release upload "$RELEASE_TAG" staged/release-assets/*

          draft_dir="${RUNNER_TEMP}/runtime-release-draft"
          mkdir -p "$draft_dir"
          gh release download "$RELEASE_TAG" --dir "$draft_dir"

          mapfile -t local_assets < <(
            find staged/release-assets -maxdepth 1 -type f -exec basename {} \; | sort
          )
          mapfile -t draft_assets < <(
            find "$draft_dir" -maxdepth 1 -type f -exec basename {} \; | sort
          )
          diff -u \
            <(printf '%s\n' "${local_assets[@]}") \
            <(printf '%s\n' "${draft_assets[@]}")
          for asset in "${local_assets[@]}"; do
            cmp "staged/release-assets/${asset}" "${draft_dir}/${asset}"
          done
          (
            cd "$draft_dir"
            sha256sum --check SHA256SUMS
          )

          draft_json="$(
            gh release view "$RELEASE_TAG" \
              --json isDraft,isImmutable,isPrerelease,name,tagName
          )"
          RELEASE_JSON="$draft_json" python3 - <<'PY'
          import json
          import os

          release = json.loads(os.environ["RELEASE_JSON"])
          tag = os.environ["RELEASE_TAG"]
          if release != {
              "isDraft": True,
              "isImmutable": False,
              "isPrerelease": False,
              "name": tag,
              "tagName": tag,
          }:
              raise SystemExit(f"unexpected draft release metadata: {release}")
          PY

          gh release edit "$RELEASE_TAG" --draft=false

          release_json="$(
            gh release view "$RELEASE_TAG" \
              --json isDraft,isImmutable,isPrerelease,name,tagName
          )"
          RELEASE_JSON="$release_json" python3 - <<'PY'
          import json
          import os

          release = json.loads(os.environ["RELEASE_JSON"])
          tag = os.environ["RELEASE_TAG"]
          if release != {
              "isDraft": False,
              "isImmutable": True,
              "isPrerelease": False,
              "name": tag,
              "tagName": tag,
          }:
              raise SystemExit(f"unexpected published release metadata: {release}")
          PY

          trap - ERR

  anaconda-upload:
    name: Upload native update packages
    runs-on: ubuntu-latest
    needs: [github-release]
    environment: anaconda
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: runtime-build-*
          path: staged
          merge-multiple: true

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: updater/pyproject.toml
          run-install: false
          cache: true

      - name: Upload immutable update packages
        shell: bash
        env:
          ANACONDA_API_KEY: ${{ secrets.ANACONDA_API_KEY }}
          ANACONDA_OWNER: ${{ secrets.ANACONDA_OWNER }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          packages=(
            "staged/update-packages/linux-64/conda-runtime-${RELEASE_VERSION}-0.conda"
            "staged/update-packages/linux-aarch64/conda-runtime-${RELEASE_VERSION}-0.conda"
            "staged/update-packages/osx-64/conda-runtime-${RELEASE_VERSION}-0.conda"
            "staged/update-packages/osx-arm64/conda-runtime-${RELEASE_VERSION}-0.conda"
            "staged/update-packages/win-64/conda-runtime-${RELEASE_VERSION}-0.conda"
          )
          pixi run \
            --manifest-path updater/pyproject.toml \
            --locked \
            rattler-build upload anaconda \
            --owner "$ANACONDA_OWNER" \
            --channel main \
            "${packages[@]}"
